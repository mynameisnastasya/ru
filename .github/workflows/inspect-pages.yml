name: Inspect Pages deployment

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pages: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect Pages and failed deploy log
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          auth=(-H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json")
          echo '=== PAGES API ==='
          curl --silent --show-error --location "${auth[@]}" \
            -w '\nHTTP_STATUS:%{http_code}\n' \
            "https://api.github.com/repos/$REPO/pages"

          curl --fail --silent --show-error --location "${auth[@]}" \
            "https://api.github.com/repos/$REPO/actions/runs?event=push&per_page=20" \
            > /tmp/runs.json
          run_id=$(python3 - <<'PY'
          import json
          d=json.load(open('/tmp/runs.json'))
          run=next(r for r in d['workflow_runs'] if r['name']=='Deploy exact uploaded site to Pages' and r.get('conclusion')=='failure')
          print(run['id'])
          PY
          )
          echo "FAILED_RUN_ID:$run_id"
          curl --fail --silent --show-error --location "${auth[@]}" \
            "https://api.github.com/repos/$REPO/actions/runs/$run_id/jobs" \
            > /tmp/jobs.json
          job_id=$(python3 - <<'PY'
          import json
          d=json.load(open('/tmp/jobs.json'))
          job=next(j for j in d['jobs'] if j.get('conclusion')=='failure')
          print(job['id'])
          PY
          )
          echo "FAILED_JOB_ID:$job_id"
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/jobs/$job_id/logs" \
            --output /tmp/job.log
          echo '=== FAILED LOG TAIL ==='
          tail -80 /tmp/job.log
