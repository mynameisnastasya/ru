name: Inspect Pages deployment

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pages: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect Pages and recent push runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -u
          echo '=== PAGES API ==='
          curl --silent --show-error --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -w '\nHTTP_STATUS:%{http_code}\n' \
            "https://api.github.com/repos/$REPO/pages"
          echo '=== RECENT PUSH RUNS ==='
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/runs?event=push&per_page=15" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); [print(r['id'], r['name'], r['status'], r.get('conclusion'), r['head_sha']) for r in d.get('workflow_runs',[])]"
