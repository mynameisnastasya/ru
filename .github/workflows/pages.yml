name: Deploy exact uploaded site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore uploaded site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cat \
            publish/site.tar.xz.hex.part-00 \
            publish/site.tar.xz.hex.part-01 \
            publish/site.tar.xz.hex.part-02-03 \
            publish/site.tar.xz.hex.part-04-05 \
            publish/site.tar.xz.hex.part-06-07 \
            publish/site.tar.xz.hex.part-08-09 \
            > /tmp/site.tar.xz.hex
          xxd -r -p /tmp/site.tar.xz.hex /tmp/site.tar.xz
          echo "2f2ddb6dc6af525e1fd3e2f65411c66e4d45e5ea6cbdecfc06e9f5d526762c44  /tmp/site.tar.xz" | sha256sum --check -
          tar -xJf /tmp/site.tar.xz -C _site
          test -f _site/index.html
          test -f _site/versions/01-aurora-botanical/index.html
          test -f _site/versions/02-spotlight-atelier/index.html
          test -f _site/versions/03-editorial-cut/index.html
          test -f _site/versions/04-shader-forest/index.html
          test -f _site/versions/05-3d-tactile/index.html

      - name: Force all content visible
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' css; do
            cat >> "$css" <<'CSS'

          /* GitHub Pages emergency visibility fix. */
          html.js .reveal,
          html.js .reveal.is-visible,
          .reveal,
          .reveal.is-visible,
          main,
          main *,
          .hero,
          .hero *,
          section,
          article {
            opacity: 1 !important;
            visibility: visible !important;
          }

          html.js .reveal,
          .reveal {
            transform: none !important;
          }

          main,
          .hero,
          .hero-copy,
          .hero-visual,
          .hero-foot {
            position: relative;
            z-index: 5;
          }
          CSS
          done < <(find _site -type f -name '*.css' -print0)

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
