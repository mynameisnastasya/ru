name: Deploy full personal brand site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore full site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site /tmp/full-site
          mkdir -p _site /tmp/full-site

          if [[ -f site-full.zip ]]; then
            unzip -q site-full.zip -d /tmp/full-site
            root="$(find /tmp/full-site -type f -name index.html -not -path '*/variants/*' -not -path '*/variants-21st/*' -printf '%h\n' | head -n 1)"
            test -n "$root"

            cp "$root/index.html" "$root/styles.css" "$root/script.js" _site/
            cp -R "$root/assets" _site/assets
            mkdir -p _site/versions _site/references
            cp -R "$root/variants-21st/01-aurora-botanical" _site/versions/
            cp -R "$root/variants-21st/02-spotlight-atelier" _site/versions/
            cp -R "$root/variants-21st/03-editorial-cut" _site/versions/
            cp -R "$root/variants-21st/04-shader-forest" _site/versions/
            cp -R "$root/variants-21st/05-3d-tactile" _site/versions/
            cp -R "$root/references/21st-components" _site/references/
          else
            cat \
              publish/site.tar.xz.hex.part-00 \
              publish/site.tar.xz.hex.part-01 \
              publish/site.tar.xz.hex.part-02-03 \
              publish/site.tar.xz.hex.part-04-05 \
              publish/site.tar.xz.hex.part-06-07 \
              publish/site.tar.xz.hex.part-08-09 \
              > /tmp/site.tar.xz.hex
            xxd -r -p /tmp/site.tar.xz.hex /tmp/site.tar.xz
            echo "2f2ddb6dc6af525e1fd3e2f65411c66e4d45e5ea6cbdecfc06e9f5d526762c44  /tmp/site.tar.xz" | sha256sum --check -
            tar -xJf /tmp/site.tar.xz -C _site
          fi

          find _site -name '.DS_Store' -delete
          find _site -type d -name '__MACOSX' -prune -exec rm -rf {} + || true

      - name: Rewrite all five site versions
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile publish/rewrite_site_v2.py
          python3 publish/rewrite_site_v2.py _site

      - name: Validate complete publication
        shell: bash
        run: |
          set -euo pipefail
          required=(
            index.html styles.css script.js
            assets/dark-leaves.jpg
            assets/forest-texture.jpg
            assets/leaf-macro.jpg
            versions/01-aurora-botanical/index.html
            versions/02-spotlight-atelier/index.html
            versions/03-editorial-cut/index.html
            versions/04-shader-forest/index.html
            versions/05-3d-tactile/index.html
            legal/privacy.html
            legal/personal-data-consent.html
            legal/terms.html
            legal/offer.html
            legal/payment-refund.html
            legal/details.html
            legal/marketing-consent.html
            legal/cookies.html
          )
          for file in "${required[@]}"; do
            test -s "_site/$file" || { echo "Missing or empty: $file"; exit 1; }
          done

          test "$(find _site/references/21st-components -type f -name '*.tsx' | wc -l)" -ge 23
          file _site/assets/*.jpg | grep -q 'JPEG image data'

          while IFS= read -r -d '' js; do
            node --check "$js"
          done < <(find _site -type f -name '*.js' -print0)

          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re

          site = Path('_site').resolve()
          versions = sorted((site / 'versions').iterdir())
          expected = {
              '01-aurora-botanical',
              '02-spotlight-atelier',
              '03-editorial-cut',
              '04-shader-forest',
              '05-3d-tactile',
          }
          if {p.name for p in versions if p.is_dir()} != expected:
              raise SystemExit('The five expected versions were not produced')

          forbidden = re.compile(
              r'искусственн|нейросет|генераци.{0,20}(?:ии|ai)|chatgpt|midjourney|claude|'
              r'(?<![а-яёa-z])ии(?![а-яёa-z])|(?<![а-z])ai(?![a-z])|'
              r'react|tailwind|aceternity|magicui|kokonut|framer|figma|tilda|webflow|gsap',
              re.IGNORECASE,
          )
          money = re.compile(r'\d[\d\s]*(?:₽|руб\.?)(?![а-яё])', re.IGNORECASE)

          class Refs(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.refs = []
              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  for key in ('href', 'src'):
                      value = attrs.get(key)
                      if value:
                          self.refs.append(value)

          required_phrases = (
              'Как проходит работа',
              'Знакомство с проектом',
              'Три индивидуальных направления',
              'Выбор и доработка',
              'Запуск сайта',
              'Работа по договору',
              'Поддержка сайта',
              'Разработка индивидуального сайта — от [УКАЗАТЬ СТОИМОСТЬ]',
              'В течение двух рабочих дней',
              'Обсудить проект',
              'Отправить материалы',
              'Узнать стоимость',
          )

          for root in versions:
              html_path = root / 'index.html'
              html = html_path.read_text(encoding='utf-8')
              css = (root / 'styles.css').read_text(encoding='utf-8')
              js = (root / 'script.js').read_text(encoding='utf-8')
              source = '\n'.join((html, css, js))

              match = forbidden.search(source)
              if match:
                  raise SystemExit(f'{root.name}: forbidden wording remains: {match.group(0)!r}')
              if money.search(html):
                  raise SystemExit(f'{root.name}: invented numeric price found')
              if html.count('process-step') != 6:
                  raise SystemExit(f'{root.name}: expected exactly six process steps')
              if html.count('[УКАЗАТЬ СТОИМОСТЬ]') < 4:
                  raise SystemExit(f'{root.name}: editable price placeholders are incomplete')
              if not all(phrase in html for phrase in required_phrases):
                  missing = [phrase for phrase in required_phrases if phrase not in html]
                  raise SystemExit(f'{root.name}: missing required content: {missing}')
              if not re.search(r'<form\b.*?</form>', html, re.S | re.I):
                  raise SystemExit(f'{root.name}: project form missing')
              for form in re.findall(r'<form\b.*?</form>', html, re.S | re.I):
                  if not re.search(r'<input\b[^>]*type=["\']checkbox["\'][^>]*required', form, re.I):
                      raise SystemExit(f'{root.name}: required consent checkbox missing')
                  if 'privacy.html' not in form or 'personal-data-consent.html' not in form:
                      raise SystemExit(f'{root.name}: legal links beside form are incomplete')
              if html.count('../../legal/') < 8:
                  raise SystemExit(f'{root.name}: footer legal links are incomplete')
              if not re.search(r'@(?:-webkit-)?keyframes|\btransition\s*:', css):
                  raise SystemExit(f'{root.name}: animations not found')

              parser = Refs()
              parser.feed(html)
              for ref in parser.refs:
                  clean = ref.split('#', 1)[0].split('?', 1)[0]
                  if not clean or clean.startswith(('http://', 'https://', '//', 'mailto:', 'tel:', 'data:')):
                      continue
                  target = (root / clean).resolve()
                  try:
                      target.relative_to(site)
                  except ValueError:
                      raise SystemExit(f'{root.name}: unsafe local reference: {ref}')
                  if not target.exists():
                      raise SystemExit(f'{root.name}: missing local reference: {ref}')

          for legal in (site / 'legal').glob('*.html'):
              text = legal.read_text(encoding='utf-8')
              if '[ЗАПОЛНИТЬ]' not in text and '[ПРОВЕРИТЬ И ЗАПОЛНИТЬ]' not in text:
                  raise SystemExit(f'{legal.name}: legal placeholder missing')
              if 'Заготовка, а не готовый юридический документ' not in text:
                  raise SystemExit(f'{legal.name}: legal disclaimer missing')

          print('Validated five rewritten versions, forms, prices, legal pages and local links')
          PY

      - name: Add animation visibility fallback
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          fallback = '''
          <script id="animation-visibility-fallback">
            window.addEventListener("DOMContentLoaded", function () {
              window.setTimeout(function () {
                var hero = document.querySelector(".hero-copy, main h1, main");
                if (!hero) return;
                var style = getComputedStyle(hero);
                if (style.opacity === "0" || style.visibility === "hidden") {
                  document.documentElement.classList.remove("js");
                  document.querySelectorAll(".reveal").forEach(function (el) {
                    el.classList.add("is-visible");
                    el.style.opacity = "1";
                    el.style.visibility = "visible";
                    el.style.transform = "none";
                  });
                }
              }, 1500);
            });
          </script>
          '''

          for html in Path('_site').rglob('*.html'):
              text = html.read_text(encoding='utf-8')
              if 'animation-visibility-fallback' not in text:
                  text = text.replace('</body>', fallback + '\n</body>', 1)
              html.write_text(text, encoding='utf-8')
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
